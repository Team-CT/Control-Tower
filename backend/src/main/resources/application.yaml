spring:
  application:
    name: ct

  profiles:
    active: dev

  config:
    import: optional:classpath:application_secret.yaml

  # 메일 (Gmail): EC2에서는 SPRING_MAIL_USERNAME, SPRING_MAIL_PASSWORD 환경변수로 설정 권장.
  # Gmail은 '앱 비밀번호' 사용 필요 (Google 계정 → 보안 → 2단계 인증 → 앱 비밀번호).
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:465}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

DATA_API:
  SERVICE_KEY: "I%2BLq678BJU%2B547TEKBXQDCAIGMBKm3RIzTDUSUNuC8VyNSc30c%2FcbH8fMY40AutRcx6IKR1McOUXc1xb9kjXRA%3D%3D"
  BASE_URL: "http://api.odcloud.kr/api/15003087/v1/uddi:89fab983-66d8-40ad-901a-d535f8699d29"

api:
  flight:
    service-key: "I%2BLq678BJU%2B547TEKBXQDCAIGMBKm3RIzTDUSUNuC8VyNSc30c%2FcbH8fMY40AutRcx6IKR1McOUXc1xb9kjXRA%3D%3D"
    base-url: "http://api.odcloud.kr/api/15003087/v1/uddi:89fab983-66d8-40ad-901a-d535f8699d29"

# 파일 업로드 경로: 로컬(Windows) C:/ct_uploads, EC2는 기본 ct_uploads(현재 작업 디렉토리 기준) 또는 FILE_UPLOAD_PATH 환경변수
# account-activation 링크 베이스 URL (운영: https://api.khair-controlltower.site, 로컬: FRONTEND_BASE_URL=http://localhost:5173)
app:
  upload:
    path: ${FILE_UPLOAD_PATH:ct_uploads}
  frontend:
    base-url: ${FRONTEND_BASE_URL:https://api.khair-controlltower.site}

# EC2/운영: 실행 전 export JWT_SECRET=실제비밀문자열 (선택: JWT_EXPIRATION=86400000)
jwt:
  secret: ${JWT_SECRET:your-default-dev-secret-change-in-prod}
  expiration: ${JWT_EXPIRATION:86400000}

---
# 테스트 시 application_secret 미로드 (H2 사용)
spring:
  config:
    activate:
      on-profile: test
    import: []

---
spring:
  config:
    activate:
      on-profile: dev

  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 100MB

  ai:
    openai:
      api-key: ${APIKEY}
      chat:
        options:
          model: gpt-4o-mini