spring:
  application:
    name: ct
  config:
    import: optional:classpath:application_secret.yaml
  profiles:
    active: dev

  # [개발 환경 설정: dev] 영역
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DATASOURCE.URL}
    username: ${DATASOURCE.USERNAME}
    password: ${DATASOURCE.PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 100MB

  # ⭐ 중요: ai 설정은 spring 하위에 있어야 합니다!
  ai:
    google:
      genai:
        api-key: AIzaSyC7PpFY9MjMAF_ie_ESlHcAyK_pmk4j5WI
        project-id: any-name-is-ok
        chat:
          options:
            model: gemini-2.5-flash
            temperature: 0.7

server:
  port: 8001
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true