# 테스트 전용: H2 인메모리 DB (메인 application.yaml의 test 프로필에서 application_secret 미로드)
spring:
  profiles:
    active: test

  datasource:
    url: "jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;DATABASE_TO_LOWER_CASE=TRUE"
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
    defer-datasource-initialization: true

  ai:
    openai:
      api-key: ${APIKEY:test-key}
